version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: travel_agent
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: TravelPg2026!ChangeMe
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=80
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - travel-postgres-data:/var/lib/postgresql/data
    shm_size: "256mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel -d travel_agent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: travel-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      bootstrap.memory_lock: "true"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      action.destructive_requires_name: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - travel-elasticsearch-data:/usr/share/elasticsearch/data
    mem_limit: 2g
    restart: unless-stopped

volumes:
  travel-postgres-data:
  travel-elasticsearch-data:
